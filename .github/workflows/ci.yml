name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  rust:
    name: Build & test Rust backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend-rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend-rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (release)
        working-directory: backend-rust
        run: cargo build --release

      - name: Health check (start + curl)
        working-directory: backend-rust
        run: |
          ./target/release/server &
          sleep 2
          curl -sf http://localhost:8000/health | python3 -c \
            "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', d; print('Health OK')"
